<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Violetta Portfolio</title>

<!-- fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
    --espresso: #3E2723;
    --peony: #F4C9D6;
    --butter: #FFEDAC;
    --white: #ffffff;
}

/* base */
body {
    margin: 0;
    background: var(--espresso);
    color: var(--butter);
    font-family: 'Inter', sans-serif;
}

/* header */
header {
    padding: 40px;
    font-size: 26px;
    letter-spacing: 2px;
    font-weight: 600;
    color: var(--peony);
}

/* nav */
nav {
    position: fixed;
    right: 40px;
    top: 40px;
}

nav a {
    color: var(--butter);
    margin-left: 20px;
    text-decoration: none;
    font-size: 13px;
    letter-spacing: 1px;
}

nav a:hover {
    color: var(--peony);
}

/* hero */
.hero {
    padding: 120px 40px;
    font-size: 54px;
    font-family: 'Playfair Display', serif;
    line-height: 1.1;
}

.hero span {
    color: var(--peony);
}

/* sections */
section {
    padding: 80px 40px;
}

h2 {
    font-family: 'Playfair Display', serif;
    color: var(--peony);
    font-size: 28px;
    margin-bottom: 20px;
}

/* grid */
.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
}

.card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(244,201,214,0.2);
    padding: 20px;
    border-radius: 16px;
    backdrop-filter: blur(10px);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
    border-color: var(--peony);
}

/* footer */
.footer {
    padding: 40px;
    font-size: 12px;
    opacity: 0.6;
    text-align: center;
}
</style>
</head>
