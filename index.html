<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Violetta — Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>

/* BASE */
body {
    margin:0;
    font-family:'Inter', sans-serif;
    background:#FAFFC7;
    color:#111;
    overflow-x:hidden;
    cursor:none;
}

/* CURSOR */
.cursor {
    width:16px;
    height:16px;
    background:#a855f7;
    position:fixed;
    pointer-events:none;
    transform:translate(-50%,-50%);
    z-index:9999;
}

.cursor-trail {
    width:40px;
    height:40px;
    border-radius:50%;
    background:rgba(168,85,247,0.2);
    position:fixed;
    pointer-events:none;
    transform:translate(-50%,-50%);
    filter:blur(10px);
    z-index:9998;
}

/* NAV */
nav {
    position:fixed;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:20px 40px;
    z-index:1000;
    backdrop-filter:blur(10px);
}

nav button {
    background:none;
    border:none;
    margin-left:20px;
    font-size:14px;
    cursor:pointer;
    transition:0.3s;
}

nav button:hover {
    color:#a855f7;
    transform:translateY(-2px);
}

/* HERO */
.hero {
    height:100vh;
    position:relative;
    overflow:hidden;
}

.hero img {
    width:100%;
    height:100%;
    object-fit:cover;
}

.hero::after {
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(to top, rgba(0,0,0,0.6), transparent);
}

/* TITLE */
.title {
    position:absolute;
    bottom:60px;
    left:60px;
    font-size:120px;
    color:white;
    line-height:0.9;
}

/* SECTIONS */
.section {
    padding:120px 60px;
}

/* GLASS CARD */
.glass {
    background:rgba(255,255,255,0.3);
    backdrop-filter:blur(20px);
    border-radius:20px;
    padding:40px;
    max-width:700px;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:30px;
}

.item {
    position:relative;
    overflow:hidden;
    border-radius:20px;
    transform:scale(0.95);
    opacity:0;
    transition:0.6s;
}

.item.show {
    transform:scale(1);
    opacity:1;
}

.item img {
    width:100%;
    height:100%;
    object-fit:cover;
    transition:0.5s;
}

.item:hover img {
    transform:scale(1.1);
    filter:brightness(1.1);
}

.label {
    position:absolute;
    bottom:15px;
    left:15px;
    background:#fff;
    padding:6px 12px;
    border-radius:10px;
    font-size:12px;
}

.wide { grid-column:span 3; }
.tall { grid-row:span 2; }

/* PARALLAX */
.parallax {
    transform:translateY(0);
    transition:transform 0.2s linear;
}

</style>
</head>

<body>

<div class="cursor"></div>
<div class="cursor-trail"></div>

<nav>
<div>VIOLETTA</div>
<div>
<button onclick="scrollToSection('about')">about</button>
<button onclick="scrollToSection('work')">work</button>
</div>
</nav>

<!-- HERO -->
<section class="hero">
<img src="https://images.unsplash.com/photo-1520975922284-9e0ce8274e17?q=80&w=2000" class="parallax">
<div class="title">VIOLETTA</div>
</section>

<!-- ABOUT -->
<section id="about" class="section">
<div class="glass">
Я працюю на перетині маркетингу, продажів і контенту.<br><br>
Створюю комунікацію, яка веде до дії.<br><br>
Маркетинг — це не шум, а сенс.
</div>
</section>

<!-- WORK -->
<section id="work" class="section">
<div class="grid">

<div class="item wide">
<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=1000">
<div class="label">campaign</div>
</div>

<div class="item tall">
<img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7?q=80&w=1000">
<div class="label">branding</div>
</div>

<div class="item">
<img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=1000">
<div class="label">content</div>
</div>

</div>
</section>

<script>

/* SCROLL NAV */
function scrollToSection(id){
document.getElementById(id).scrollIntoView({behavior:'smooth'});
}

/* CURSOR */
const cursor = document.querySelector('.cursor');
const trail = document.querySelector('.cursor-trail');

let mouseX = 0, mouseY = 0;
let trailX = 0, trailY = 0;

document.addEventListener('mousemove', e => {
    mouseX = e.clientX;
    mouseY = e.clientY;

    cursor.style.left = mouseX + 'px';
    cursor.style.top = mouseY + 'px';
});

function animateTrail() {
    trailX += (mouseX - trailX) * 0.1;
    trailY += (mouseY - trailY) * 0.1;

    trail.style.left = trailX + 'px';
    trail.style.top = trailY + 'px';

    requestAnimationFrame(animateTrail);
}
animateTrail();

/* PARALLAX */
window.addEventListener('scroll', () => {
    document.querySelectorAll('.parallax').forEach(el => {
        let speed = 0.3;
        el.style.transform = `translateY(${window.scrollY * speed}px)`;
    });
});

</script>

</body>
</html>
