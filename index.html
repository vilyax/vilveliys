<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Violetta Portfolio</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a0a0a;
    color: white;
}

header {
    padding: 40px;
    font-size: 28px;
    letter-spacing: 2px;
}

nav {
    position: fixed;
    right: 40px;
    top: 40px;
}

nav a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
    font-size: 14px;
}

section {
    padding: 100px 40px;
}

.hero {
    font-size: 48px;
    max-width: 600px;
}

.hero span {
    color: #c2a47e;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
}

.card {
    background: #111;
    padding: 20px;
}

.footer {
    padding: 40px;
    font-size: 12px;
    opacity: 0.6;
}
</style>

</head>
<body>

<header>VIOLETTA</header>

<nav>
<a href="#home">Home</a>
<a href="#marketing">Marketing</a>
<a href="#model">Model</a>
<a href="#contact">Contact</a>
</nav>

<section id="home">
<div class="hero">
Marketing is my <span>language</span>.<br>
Modeling is my <span>form</span>.
</div>
</section>

<section id="marketing">
<h2>Marketing</h2>
<div class="grid">
<div class="card">Case 1 — Coming soon</div>
<div class="card">Case 2 — Coming soon</div>
</div>
</section>

<section id="model">
<h2>Model</h2>
<div class="grid">
<div class="card">Photo 1</div>
<div class="card">Photo 2</div>
</div>
</section>

<section id="contact">
<h2>Contact</h2>
<p>Instagram: @yourname</p>
</section>

<div class="footer">
© 2026 Violetta
</div>

</body>
</html>
