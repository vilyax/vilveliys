<!DOCTYPE html>
<html lang="uk">
	<head><meta http-equiv="content-type" content="text/html; charset=utf-8">

		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Violetta Portfolio</title>

		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&amp;display=swap" rel="stylesheet">

		<style>

			/* ===== BASE ===== */
			body {
				margin:0;
				font-family:'Inter', sans-serif;
				background: linear-gradient(135deg,#FFEDAC,#F4C9D6,#E0CCFF);
				color:#1a1a1a;
				scroll-behavior:smooth;
			}

			/* ===== NAV ===== */
			nav {
				position:fixed;
				top:0;
				width:100%;
				display:flex;
				justify-content:space-between;
				align-items:center;
				padding:20px 40px;
				background:rgba(255,255,255,0.35);
				backdrop-filter:blur(15px);
				z-index:1000;
			}

			.nav-buttons {
				display:flex;
				gap:10px;
			}

			/* ===== BUTTONS ===== */
			.btn {
				padding:10px 18px;
				border-radius:12px;
				border:none;
				cursor:pointer;
				font-size:13px;
				transition:0.3s;
			}

			.btn-glass {
				background: rgba(255,255,255,0.5);
			}

			.btn-glass:hover {
				background: rgba(255,255,255,0.9);
				transform:translateY(-2px);
			}

			.btn-primary {
				background: linear-gradient(135deg,#F4C9D6,#C69FD5);
				color:white;
			}

			.btn-outline {
				border:1px solid #C69FD5;
				background:transparent;
				color:#C69FD5;
			}

			/* ===== HERO ===== */
			.hero {
				height:100vh;
				display:flex;
				flex-direction:column;
				align-items:center;
				justify-content:center;
				text-align:center;
				padding-top:80px;
			}

			/* ===== PHOTO (clean luxe glow) ===== */
			.hero-photo {
				display:flex;
				justify-content:center;
				margin-bottom:30px;
			}

			.photo-glow {
				position:relative;
				width:220px;
				height:280px;
				border-radius:18px;
				overflow:hidden;
				transition:0.6s ease;
			}

			/* image */
			.photo-glow img {
				width:100%;
				height:100%;
				object-fit:cover;
				display:block;
				border-radius:18px;

				filter: contrast(1.05) brightness(1.03);
				transition:0.6s ease;
			}

			/* glow layer */
			.glow {
				position:absolute;
				inset:0;
				background:
					radial-gradient(circle at 30% 20%, rgba(244,201,214,0.55), transparent 60%),
					radial-gradient(circle at 70% 80%, rgba(198,159,213,0.45), transparent 60%);
				mix-blend-mode: screen;
				opacity:0.85;
				transition:0.6s ease;
			}

			/* shine effect */
			.photo-glow::before {
				content:"";
				position:absolute;
				top:0;
				left:-120%;
				width:120%;
				height:100%;
				background: linear-gradient(120deg, transparent, rgba(255,255,255,0.5), transparent);
				transition:0.9s;
			}

			/* hover */
			.photo-glow:hover {
				transform: translateY(-8px) scale(1.02);
			}

			.photo-glow:hover img {
				transform: scale(1.04);
			}

			.photo-glow:hover .glow {
				opacity:1;
			}

			.photo-glow:hover::before {
				left:120%;
			}

			/* ===== TEXT ===== */
			.hero h1 {
				font-size:70px;
				margin:0;
				letter-spacing:2px;
			}

			.hero p {
				opacity:0.7;
				margin-top:10px;
			}

			.hero-buttons {
				margin-top:20px;
				display:flex;
				gap:15px;
			}

			/* ===== SECTIONS ===== */
			.section {
				padding:100px 60px;
			}

			h2 {
				font-size:32px;
				margin-bottom:30px;
			}

			/* ===== GRID ===== */
			.grid {
				display:grid;
				grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
				gap:20px;
			}

			.card {
				padding:20px;
				border-radius:20px;
				background:rgba(255,255,255,0.4);
				backdrop-filter:blur(10px);
				transition:0.4s;
			}

			.card:hover {
				transform:translateY(-8px);
				box-shadow:0 10px 30px rgba(0,0,0,0.15);
			}

			/* ===== FORM ===== */
			input, textarea {
				width:100%;
				padding:12px;
				margin-bottom:10px;
				border-radius:10px;
				border:none;
			}

			/* ===== FOOTER ===== */
			footer {
				text-align:center;
				padding:40px;
				opacity:0.6;
			}

		</style>
	</head>

	<body>
		<!-- NAV --><nav>
		<div>VIOLETTA</div>
		<div class="nav-buttons"><button class="btn btn-glass">About</button> <button class="btn btn-glass">Portfolio</button> <button class="btn btn-glass">Services</button> <button class="btn btn-glass">Contact</button></div>
		</nav><!-- HERO -->
		<section class="hero">
			<div class="hero-photo">
				<div class="photo-glow"><img src="https://s9399914.sendpul.se/image/747991a0e145ac2bbe69f063a9402e69/files/emailservice/userfiles/eb792d26952ec312a7c0090080a8b29f9399914/photo_2026-04-17_21-01-38.jpg" alt="Violetta">
					<div class="glow"><br></div>
				</div>
			</div>
			<h1>VIOLETTA</h1>
			<p>marketing • modeling • creative</p>
			<div class="hero-buttons"><button class="btn btn-primary">Portfolio</button> <button class="btn btn-outline">Contact</button></div>
		</section>
		<!-- ABOUT -->
		<section class="section">
			<h2>About</h2>
			<div class="grid">
				<div class="card">Маркетинг як мова впливу</div>
				<div class="card">Model / Creative</div>
				<div class="card">CRM, стратегія, контент</div>
			</div>
		</section>
		<!-- PORTFOLIO -->
		<section class="section">
			<h2>Portfolio</h2>
			<div class="grid">
				<div class="card">Model</div>
				<div class="card">Marketing</div>
				<div class="card">Brand</div>
			</div>
		</section>
		<!-- SERVICES -->
		<section class="section">
			<h2>Services</h2>
			<div class="grid">
				<div class="card">Strategy</div>
				<div class="card">Content</div>
				<div class="card">Branding</div>
			</div>
		</section>
		<!-- CONTACT -->
		<section class="section">
			<h2>Contact</h2>
			<input placeholder="Name" type="text"> <input placeholder="Email" type="text"> <textarea placeholder="Message"></textarea> <button class="btn btn-primary">Send</button></section>
		<footer>© 2026 Violetta Portfolio</footer>
	</body>
</html>
