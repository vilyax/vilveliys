<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Violetta Y2K</title>

<style>

/* BASE */
body {
    margin:0;
    font-family: Arial;
    background:#FAFFC7;
    color:#111;
    overflow-x:hidden;
    cursor:none;
}

/* CURSOR GLOW */
.cursor {
    width:30px;
    height:30px;
    border-radius:50%;
    background:rgba(198,159,213,0.5);
    position:fixed;
    pointer-events:none;
    transform:translate(-50%,-50%);
    filter:blur(10px);
    z-index:9999;
}

/* NAV */
nav {
    position:fixed;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:20px;
    z-index:1000;
    backdrop-filter:blur(10px);
}

nav button {
    background:none;
    border:none;
    margin-left:20px;
    font-size:14px;
    cursor:pointer;
}

/* PAGES */
.page {
    position:absolute;
    width:100%;
    min-height:100vh;
    opacity:0;
    pointer-events:none;
    transition:0.8s;
}

.page.active {
    opacity:1;
    pointer-events:auto;
}

/* HERO */
.hero {
    height:100vh;
    position:relative;
}

.hero img {
    width:100%;
    height:100%;
    object-fit:cover;
    filter:contrast(1.1) saturate(1.2);
}

/* GLITCH TEXT */
.glitch {
    position:absolute;
    bottom:40px;
    left:40px;
    font-size:120px;
    color:#fff;
    text-shadow:2px 2px #c69fd5, -2px -2px #FFD1D5;
    animation:glitch 0.3s infinite;
}

@keyframes glitch {
    0% {transform:translate(0);}
    20% {transform:translate(-2px,2px);}
    40% {transform:translate(2px,-2px);}
    60% {transform:translate(-1px,1px);}
    80% {transform:translate(1px,-1px);}
    100% {transform:translate(0);}
}

/* GLASS CARD */
.glass {
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(20px);
    border-radius:20px;
    padding:30px;
    margin:20px;
}

/* CHAOS GRID */
.grid {
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:20px;
    padding:100px 40px;
}

.item {
    position:relative;
    border-radius:20px;
    overflow:hidden;
}

.item img {
    width:100%;
    height:100%;
    object-fit:cover;
    transition:0.5s;
}

/* HOVER DISTORT */
.item:hover img {
    transform:scale(1.1) rotate(1deg);
    filter:hue-rotate(10deg);
}

/* RANDOM SIZES */
.wide { grid-column:span 3; }
.tall { grid-row:span 2; }

/* LABEL */
.label {
    position:absolute;
    bottom:10px;
    left:10px;
    background:#FFD1D5;
    padding:5px 10px;
    border-radius:10px;
}

/* FLOATING BLOBS */
.blob {
    position:absolute;
    width:200px;
    height:200px;
    background:#FFD1D5;
    border-radius:50%;
    filter:blur(50px);
    z-index:-1;
}

/* ABOUT TEXT */
.about {
    font-size:22px;
    line-height:1.7;
    max-width:700px;
    margin:100px 40px;
}

</style>
</head>

<body>
